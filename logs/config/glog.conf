# WeakNet glog 配置文件
# 日志级别: INFO, WARNING, ERROR, FATAL
# 0=INFO, 1=WARNING, 2=ERROR, 3=FATAL

# 日志输出到stderr (控制台)
logtostderr=true

# 同时输出到文件
alsologtostderr=true

# 日志文件目录
log_dir=./logs/server

# 日志文件前缀（留空或删除以使用默认）
# log_prefix=

# 日志文件后缀（可选）
# log_suffix=.log

# 日志文件最大大小 (MB)
max_log_size=10

# 保留的日志文件数量
max_log_files=5

# 日志级别 (0=INFO, 1=WARNING, 2=ERROR, 3=FATAL)
minloglevel=0

# 时间戳格式
timestamp_in_logfile_name=true

# 添加颜色输出
colorlogtostderr=true

# 显示文件名和行号
show_log_prefix=true


